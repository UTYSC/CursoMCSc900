<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Hola Mundo - En Memoria</title>
</head>

<body>
  <main>
    <div class="container">
      <!-- Hola Mundo con colores -->
      <h1 class="title">
        <span class="color-blue">H</span><span class="color-red">o</span><span class="color-green">l</span><span class="color-yellow">a</span>
        <span class="color-purple">M</span><span class="color-pink">u</span><span class="color-blue">n</span><span class="color-red">d</span><span class="color-green">o</span>
      </h1>

      <!-- Botón que no hace nada -->
      <button class="decorative-button">✨ Botón Especial ✨</button>

      <!-- Recuadro de homenaje -->
      <div class="memorial-box">
        <div class="memorial-header">
          <span class="memorial-symbol">🌸</span>
          <h2>En Memoria Elegida</h2>
          <span class="memorial-symbol">🌺</span>
        </div>
        <div class="memorial-content">
          <p>En memoria de <strong>Pirruñis (Gatuchis)</strong> y <strong>Petete (Sr. Perrito)</strong></p>
          <p class="memorial-subtitle">Dos amigos que dejaron huellas en nuestros corazones</p>
        </div>
        <div class="memorial-footer">
          <div class="paw-prints">🐾 🐾 🐾</div>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
